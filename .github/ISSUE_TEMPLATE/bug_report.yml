name: Bug report
description: Report a reproducible bug in the generator or output docs
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please provide enough detail to reproduce the issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: e.g. 20.12.2
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include commands, sample metadata paths, and observed output.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs/errors
      render: shell
